name: Publish to Instagram

on:
  schedule:
    # Singoli post: ogni giorno alle 7:00 (UTC+2 = 5:00 UTC)
    - cron: '0 5 * * *'
    # Aggregati: lunedì-venerdì ore 16:00, sabato 16:00 (preview weekend), domenica 16:00 (preview settimanale)
    - cron: '0 16 * * 1-5'
    - cron: '0 16 * * 6'
    - cron: '0 16 * * 0'
  workflow_dispatch:
    inputs:
      test_date:
        description: 'Solo per test: data (AAAA-MM-GG) da usare come "oggi" per simulare un post di quel giorno. Lasciare vuoto per la pubblicazione normale.'
        required: false
        default: ''

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run publish script
        env:
          INSTAGRAM_TOKEN: ${{ secrets.INSTAGRAM_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          FACEBOOK_PAGE_TOKEN: ${{ secrets.FACEBOOK_PAGE_TOKEN }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PUBLISH_LIVE: ${{ vars.PUBLISH_LIVE }}
          TEST_DATE: ${{ github.event.inputs.test_date }}
        run: python scripts/publish.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git commit -m "Auto-publish post $(date +%Y-%m-%d)" || true
          git push
