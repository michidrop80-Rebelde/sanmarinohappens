name: Metriche settimanali (sola lettura)

on:
  schedule:
    # Ogni LUNEDÌ, 02:00 UTC (~03:00-04:00 San Marino).
    # I cron di GitHub partono con ore di ritardo: l'orario esatto non è garantito,
    # ma il giorno (lunedì) sì. Va bene: le metriche non sono urgenti.
    - cron: '0 2 * * 1'
  workflow_dispatch:   # permette anche l'avvio manuale dal sito GitHub

permissions:
  contents: write      # serve per ricommittare storico.json + metriche-social.md

jobs:
  metriche:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Raccogli metriche
        env:
          INSTAGRAM_TOKEN: ${{ secrets.INSTAGRAM_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/metrics.py

      - name: Salva i dati aggiornati nel repo
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git commit -m "Metriche settimanali $(date +%Y-%m-%d)" || true
          git push
